title: BGI RevealJS
author: Burning Glass Institute
version: 1.0.0
quarto-required: ">=1.3.0"
contributes:
  formats:
    revealjs:
      theme: [default, bgi-theme.scss]
      logo: bgi-logo.svg
      footer: "&copy;2026 The Burning Glass Institute"
      slide-number: true
      width: 1344
      height: 756
      margin: 0.04
      center: false
      transition: none
      include-after-body: logo-resize.html
      filters:
        - bgi-filter.lua
      title-slide-attributes:
        data-background-color: "#115780"
        data-background-image: "title-bg.png"
        data-background-size: "cover"
        data-background-position: "center"
      format-resources:
        - bgi-logo.svg
        - title-bg.png
